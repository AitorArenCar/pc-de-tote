<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password - PC de Tote</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .reset-container {
      max-width: 400px;
      width: 100%;
      padding: 30px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .reset-container h1 {
      margin: 0 0 10px;
      font-size: 24px;
      text-align: center;
    }
    .reset-container p {
      margin: 0 0 20px;
      font-size: 14px;
      text-align: center;
      color: var(--muted);
    }
    #resetMessage {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-size: 14px;
      display: none;
    }
    #resetMessage.success {
      background: rgba(52, 211, 153, 0.1);
      color: var(--ok);
      display: block;
    }
    #resetMessage.error {
      background: rgba(239, 68, 68, 0.1);
      color: var(--bad);
      display: block;
    }
    #resetBtn {
      width: 100%;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="reset-container">
    <h1>🔐 Cambiar Contraseña</h1>
    <p>Ingresa tu nueva contraseña</p>
    
    <div id="resetForm">
      <div class="field">
        <label for="newPassword">Nueva Contraseña</label>
        <input id="newPassword" type="password" placeholder="Ingresa tu nueva contraseña" />
      </div>
      <div class="field">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input id="confirmPassword" type="password" placeholder="Confirma tu contraseña" />
      </div>
      <button id="resetBtn" class="btn btn-primary">Cambiar Contraseña</button>
    </div>
    
    <div id="resetMessage"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    const $newPassword = document.getElementById('newPassword');
    const $confirmPassword = document.getElementById('confirmPassword');
    const $resetBtn = document.getElementById('resetBtn');
    const $resetMessage = document.getElementById('resetMessage');
    const $resetForm = document.getElementById('resetForm');

    $resetBtn.addEventListener('click', async () => {
      const password = $newPassword.value.trim();
      const confirm = $confirmPassword.value.trim();

      // Validación
      if (!password || !confirm) {
        showMessage('Por favor completa todos los campos', 'error');
        return;
      }

      if (password.length < 6) {
        showMessage('La contraseña debe tener al menos 6 caracteres', 'error');
        return;
      }

      if (password !== confirm) {
        showMessage('Las contraseñas no coinciden', 'error');
        return;
      }

      // Deshabilitar botón
      $resetBtn.disabled = true;
      $resetBtn.textContent = 'Procesando...';

      try {
        const { error } = await window.sb.auth.updateUser({ password });
        
        if (error) {
          showMessage(`❌ Error: ${error.message}`, 'error');
          $resetBtn.disabled = false;
          $resetBtn.textContent = 'Cambiar Contraseña';
        } else {
          showMessage('✅ ¡Contraseña cambiada exitosamente! Redirigiendo...', 'success');
          $resetForm.style.display = 'none';
          setTimeout(() => window.location.href = '/', 2000);
        }
      } catch (err) {
        showMessage(`❌ Error inesperado: ${err.message}`, 'error');
        $resetBtn.disabled = false;
        $resetBtn.textContent = 'Cambiar Contraseña';
      }
    });

    // Permitir envío con Enter
    $newPassword.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') $resetBtn.click();
    });
    $confirmPassword.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') $resetBtn.click();
    });

    function showMessage(text, type) {
      $resetMessage.textContent = text;
      $resetMessage.className = type;
    }

    // Verificar si hay un token válido en la URL
    const url = new URL(window.location.href);
    const token = url.searchParams.get('token');
    const type = url.searchParams.get('type');

    if (!token || type !== 'recovery') {
      showMessage('❌ Token inválido o expirado. Por favor solicita otro reset de contraseña.', 'error');
      $resetForm.style.display = 'none';
    }
  </script>
</body>
</html>
