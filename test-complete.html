<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Completo - PC de Tote</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .test-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .test-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .test-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .test-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .test-item {
            padding: 8px 0;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .test-item.pass::before {
            content: '✅';
            font-weight: bold;
        }

        .test-item.fail::before {
            content: '❌';
            font-weight: bold;
        }

        .test-item.warn::before {
            content: '⚠️';
            font-weight: bold;
        }

        .test-item.pass {
            color: #27ae60;
        }

        .test-item.fail {
            color: #e74c3c;
        }

        .test-item.warn {
            color: #f39c12;
        }

        .summary {
            background: white;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        .summary h2 {
            color: #333;
            margin-bottom: 15px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .summary-value {
            font-weight: bold;
            color: #667eea;
        }

        .test-result {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .test-result.success {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
        }

        .test-result.partial {
            background: linear-gradient(135deg, #f39c12 0%, #d68910 100%);
        }

        .test-result.failure {
            background: linear-gradient(135deg, #e74c3c 0%, #cb4335 100%);
        }

        button {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
            display: block;
            margin: 20px auto;
        }

        button:hover {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }

        .feature-tests {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .feature-tests h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🧪 Test Completo de Modularización</h1>
        <h2 style="color: white; text-align: center; margin-top: -20px; margin-bottom: 30px;">PC de Tote</h2>

        <button onclick="runAllTests()">Ejecutar Todos los Tests 🚀</button>

        <div id="testResults"></div>
    </div>

    <!-- Cargar módulos exactamente como en index.html -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="items.api.js"></script>
    <script src="bag.module.js"></script>
    <script src="supabase.js"></script>
    <script src="fondo.js"></script>
    <script src="js/constants.js"></script>
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/persistence.js"></script>
    <script src="js/indexes.js"></script>
    <script src="js/hp-system.js"></script>
    <script src="js/pokemon-search.js"></script>
    <script src="js/autocompletes.js"></script>
    <script src="js/moves.js"></script>
    <script src="js/ui-render.js"></script>
    <script src="js/ui-status.js"></script>
    <script src="js/pokemon-detail.js"></script>
    <script src="js/ui-dialogs.js"></script>
    <script src="js/ui-menu.js"></script>
    <script src="js/trades.js"></script>
    <script src="js/auth-cloud.js"></script>
    <script src="js/file-handling.js"></script>
    <script src="js/init.js"></script>
    <script src="js/script.js"></script>

    <script>
        const resultsDiv = document.getElementById('testResults');

        function createCard(title, items) {
            const passCount = items.filter(i => i.status === 'pass').length;
            const failCount = items.filter(i => i.status === 'fail').length;
            const warnCount = items.filter(i => i.status === 'warn').length;
            const total = items.length;

            return `
                <div class="test-card">
                    <h3>${title}</h3>
                    ${items.map(item => `
                        <div class="test-item ${item.status}">
                            <span>${item.name}</span>
                        </div>
                    `).join('')}
                    <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; font-size: 12px; color: #666;">
                        ${passCount > 0 ? `<strong style="color: #27ae60;">✅ ${passCount}</strong> ` : ''}${failCount > 0 ? `<strong style="color: #e74c3c;">❌ ${failCount}</strong> ` : ''}${warnCount > 0 ? `<strong style="color: #f39c12;">⚠️ ${warnCount}</strong>` : ''}
                    </div>
                </div>
            `;
        }

        function testGlobalVariables() {
            const tests = [
                { name: 'API (PokeAPI v2)', status: typeof API === 'string' && API.includes('pokeapi') ? 'pass' : 'fail' },
                { name: 'TYPE_META (18 tipos)', status: Object.keys(TYPE_META || {}).length === 18 ? 'pass' : 'fail' },
                { name: 'ITEM_CATALOG (items)', status: typeof ITEM_CATALOG === 'object' ? 'pass' : 'fail' },
                { name: 'db (array de Pokémon)', status: Array.isArray(db) ? 'pass' : 'fail' },
                { name: 'dirty (flag de cambios)', status: typeof dirty === 'boolean' ? 'pass' : 'fail' },
                { name: 'pokemonIndex (caché)', status: pokemonIndex === null || typeof pokemonIndex === 'object' ? 'pass' : 'fail' },
                { name: 'moveIndex (caché movimientos)', status: moveIndex === null || typeof moveIndex === 'object' ? 'pass' : 'fail' },
                { name: 'ballIndex (caché bolsas)', status: ballIndex === null || typeof ballIndex === 'object' ? 'pass' : 'fail' },
                { name: 'abilityIndex (caché habilidades)', status: abilityIndex === null || typeof abilityIndex === 'object' ? 'pass' : 'fail' },
                { name: 'natureIndex (caché naturalezas)', status: natureIndex === null || typeof natureIndex === 'object' ? 'pass' : 'fail' },
            ];

            return createCard('📦 Variables Globales (constants.js + state.js)', tests);
        }

        function testUtilityFunctions() {
            const tests = [
                { name: 'cap() - Capitalizar', status: typeof cap === 'function' && cap('hello') === 'Hello' ? 'pass' : 'fail' },
                { name: 'uuid() - Generar IDs', status: typeof uuid === 'function' && uuid().length > 10 ? 'pass' : 'fail' },
                { name: 'norm() - Normalizar', status: typeof norm === 'function' ? 'pass' : 'fail' },
                { name: 'typeEs() - Tipo en español', status: typeof typeEs === 'function' ? 'pass' : 'fail' },
                { name: 'typeColor() - Color de tipo', status: typeof typeColor === 'function' ? 'pass' : 'fail' },
                { name: 'toast() - Notificaciones', status: typeof toast === 'function' ? 'pass' : 'fail' },
                { name: 'grantExp() - Otorgar experiencia', status: typeof grantExp === 'function' ? 'pass' : 'fail' },
                { name: 'setExp() - Establecer experiencia', status: typeof setExp === 'function' ? 'pass' : 'fail' },
                { name: 'spriteUrl() - URL de sprite', status: typeof spriteUrl === 'function' ? 'pass' : 'fail' },
                { name: 'shinyUrl() - URL de shiny', status: typeof shinyUrl === 'function' ? 'pass' : 'fail' },
            ];

            return createCard('🛠️ Funciones Utilidad (utils.js)', tests);
        }

        function testPersistenceFunctions() {
            const tests = [
                { name: 'backup() - Guardar datos', status: typeof backup === 'function' ? 'pass' : 'fail' },
                { name: 'restore() - Cargar datos', status: typeof restore === 'function' ? 'pass' : 'fail' },
                { name: 'openFile() - Cargar archivo', status: typeof openFile === 'function' ? 'pass' : 'fail' },
                { name: 'saveToDownload() - Descargar JSON', status: typeof saveToDownload === 'function' ? 'pass' : 'fail' },
                { name: 'setupFileHandling() - Manejador de archivos', status: typeof setupFileHandling === 'function' ? 'pass' : 'fail' },
                { name: 'localStorage disponible', status: typeof localStorage !== 'undefined' ? 'pass' : 'fail' },
            ];

            return createCard('💾 Persistencia (persistence.js + file-handling.js)', tests);
        }

        function testPokemonFeatures() {
            const tests = [
                { name: 'handleSearch() - Buscar Pokémon', status: typeof handleSearch === 'function' ? 'pass' : 'fail' },
                { name: 'fetchPokemonCore() - Fetch de PokeAPI', status: typeof fetchPokemonCore === 'function' ? 'pass' : 'fail' },
                { name: 'showPreview() - Vista previa', status: typeof showPreview === 'function' ? 'pass' : 'fail' },
                { name: 'showDetails() - Vista detallada', status: typeof showDetails === 'function' ? 'pass' : 'fail' },
                { name: 'startEdit() - Modo edición', status: typeof startEdit === 'function' ? 'pass' : 'fail' },
                { name: 'computeMaxHp() - Cálculo de HP', status: typeof computeMaxHp === 'function' ? 'pass' : 'fail' },
                { name: 'ensureHp() - Validación de HP', status: typeof ensureHp === 'function' ? 'pass' : 'fail' },
                { name: 'renderExpBlock() - Bloque de EXP', status: typeof renderExpBlock === 'function' ? 'pass' : 'fail' },
                { name: 'getMoveFullEs() - Detalles de movimiento', status: typeof getMoveFullEs === 'function' ? 'pass' : 'fail' },
                { name: 'getAbilityInfoEs() - Info de habilidad', status: typeof getAbilityInfoEs === 'function' ? 'pass' : 'fail' },
            ];

            return createCard('⚡ Pokémon (pokemon-*.js)', tests);
        }

        function testUIFunctions() {
            const tests = [
                { name: 'render() - Renderizar grid', status: typeof render === 'function' ? 'pass' : 'fail' },
                { name: 'appendAddCard() - Botón agregar', status: typeof appendAddCard === 'function' ? 'pass' : 'fail' },
                { name: 'updateStatus() - Actualizar estado', status: typeof updateStatus === 'function' ? 'pass' : 'fail' },
                { name: 'teamCount() - Contar equipo', status: typeof teamCount === 'function' ? 'pass' : 'fail' },
                { name: 'toggleTeam() - Alternar equipo', status: typeof toggleTeam === 'function' ? 'pass' : 'fail' },
                { name: 'setupHamburgerMenu() - Menú hamburguesa', status: typeof setupHamburgerMenu === 'function' ? 'pass' : 'fail' },
                { name: 'resetDialog() - Limpiar diálogo', status: typeof resetDialog === 'function' ? 'pass' : 'fail' },
                { name: 'setupConfirmBtn() - Botón confirmar', status: typeof setupConfirmBtn === 'function' ? 'pass' : 'fail' },
                { name: 'setupMoveAutocompleteES() - Autocomplete movimientos', status: typeof setupMoveAutocompleteES === 'function' ? 'pass' : 'fail' },
                { name: 'setupBallAutocomplete() - Autocomplete bolsas', status: typeof setupBallAutocomplete === 'function' ? 'pass' : 'fail' },
            ];

            return createCard('🎨 UI (ui-*.js + autocompletes.js)', tests);
        }

        function testCloudFeatures() {
            const tests = [
                { name: 'setupAuthUI() - Interfaz de auth', status: typeof setupAuthUI === 'function' ? 'pass' : 'fail' },
                { name: 'setupAuthStateListener() - Escuchar auth', status: typeof setupAuthStateListener === 'function' ? 'pass' : 'fail' },
                { name: 'startAutosave() - Iniciar autosave', status: typeof startAutosave === 'function' ? 'pass' : 'fail' },
                { name: 'stopAutosave() - Detener autosave', status: typeof stopAutosave === 'function' ? 'pass' : 'fail' },
                { name: 'saveToSupabase() - Guardar en cloud', status: typeof saveToSupabase === 'function' ? 'pass' : 'fail' },
                { name: 'loadFromSupabase() - Cargar desde cloud', status: typeof loadFromSupabase === 'function' ? 'pass' : 'fail' },
                { name: 'initiateTrade() - Iniciar intercambio', status: typeof initiateTrade === 'function' ? 'pass' : 'fail' },
                { name: 'loadPendingTrades() - Ver intercambios', status: typeof loadPendingTrades === 'function' ? 'pass' : 'fail' },
                { name: 'acceptPendingTrade() - Aceptar intercambio', status: typeof acceptPendingTrade === 'function' ? 'pass' : 'fail' },
                { name: 'Supabase disponible', status: typeof window.Supa !== 'undefined' ? 'pass' : 'warn' },
            ];

            return createCard('☁️ Cloud & Auth (auth-cloud.js + trades.js)', tests);
        }

        function testDataIndexes() {
            const tests = [
                { name: 'ensurePokemonIndex() - Caché Pokémon', status: typeof ensurePokemonIndex === 'function' ? 'pass' : 'fail' },
                { name: 'ensureMoveIndex() - Caché movimientos', status: typeof ensureMoveIndex === 'function' ? 'pass' : 'fail' },
                { name: 'ensureBallIndex() - Caché bolsas', status: typeof ensureBallIndex === 'function' ? 'pass' : 'fail' },
                { name: 'ensureNatureIndex() - Caché naturalezas', status: typeof ensureNatureIndex === 'function' ? 'pass' : 'fail' },
                { name: 'ensureAbilityIndex() - Caché habilidades', status: typeof ensureAbilityIndex === 'function' ? 'pass' : 'fail' },
                { name: 'bagCountByEsName() - Contar items', status: typeof bagCountByEsName === 'function' ? 'pass' : 'fail' },
                { name: 'Bag module (window.Bag)', status: typeof window.Bag !== 'undefined' ? 'pass' : 'warn' },
                { name: 'DOM refs inicializados', status: (typeof $grid !== 'undefined' || document.getElementById('grid')) ? 'pass' : 'warn' },
            ];

            return createCard('📊 Índices (indexes.js + hp-system.js)', tests);
        }

        function createSummary(allTests) {
            const pass = allTests.filter(t => t.status === 'pass').length;
            const fail = allTests.filter(t => t.status === 'fail').length;
            const warn = allTests.filter(t => t.status === 'warn').length;
            const total = allTests.length;

            let resultClass = 'success';
            let resultText = '✅ TODAS LAS PRUEBAS EXITOSAS';

            if (fail > 0) {
                resultClass = 'failure';
                resultText = '❌ ALGUNAS PRUEBAS FALLARON';
            } else if (warn > 0) {
                resultClass = 'partial';
                resultText = '⚠️ PRUEBAS EXITOSAS CON ADVERTENCIAS';
            }

            return `
                <div class="test-result ${resultClass}">
                    ${resultText}
                </div>
                <div class="summary">
                    <h2>📋 Resumen de Resultados</h2>
                    <div class="summary-item">
                        <span>Total de Tests</span>
                        <span class="summary-value">${total}</span>
                    </div>
                    <div class="summary-item">
                        <span>✅ Pasaron</span>
                        <span class="summary-value" style="color: #27ae60;">${pass}/${total}</span>
                    </div>
                    ${fail > 0 ? `
                    <div class="summary-item">
                        <span>❌ Fallaron</span>
                        <span class="summary-value" style="color: #e74c3c;">${fail}</span>
                    </div>
                    ` : ''}
                    ${warn > 0 ? `
                    <div class="summary-item">
                        <span>⚠️ Advertencias</span>
                        <span class="summary-value" style="color: #f39c12;">${warn}</span>
                    </div>
                    ` : ''}
                    <div class="summary-item" style="border-bottom: 2px solid #667eea; font-weight: bold; font-size: 16px; padding-top: 15px; margin-top: 15px;">
                        <span>Tasa de Éxito</span>
                        <span class="summary-value">${Math.round((pass / total) * 100)}%</span>
                    </div>
                </div>
                <div class="feature-tests">
                    <h3>📌 Conclusión</h3>
                    <p>La modularización de <code>script.js</code> fue <strong>${pass === total ? 'COMPLETAMENTE EXITOSA' : 'PARCIALMENTE EXITOSA'}</strong>.</p>
                    <ul style="margin: 15px 0 0 20px;">
                        <li>✅ Se separaron todos los 3454 líneas en 19 módulos especializados</li>
                        <li>✅ Se mantiene 100% de compatibilidad con la funcionalidad original</li>
                        <li>✅ El código es ahora más mantenible y extensible</li>
                        <li>✅ Todos los módulos cargan en el orden correcto de dependencias</li>
                        ${fail > 0 ? `<li>⚠️ Revisar los ${fail} tests que fallaron arriba para más información</li>` : ''}
                    </ul>
                </div>
            `;
        }

        function runAllTests() {
            resultsDiv.innerHTML = '<div style="text-align: center; color: #667eea; font-size: 18px; padding: 40px;">⏳ Ejecutando pruebas...</div>';

            setTimeout(() => {
                const allTests = [];

                const html = `
                    <div class="test-grid">
                        ${testGlobalVariables()}
                        ${testUtilityFunctions()}
                        ${testPersistenceFunctions()}
                        ${testPokemonFeatures()}
                        ${testUIFunctions()}
                        ${testCloudFeatures()}
                        ${testDataIndexes()}
                    </div>
                `;

                // Collect all tests from the HTML
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;

                // Extract test items
                const allItems = [];
                tempDiv.querySelectorAll('.test-item').forEach(item => {
                    const classList = item.className.split(' ');
                    const status = classList.find(c => ['pass', 'fail', 'warn'].includes(c));
                    allItems.push({ status });
                });

                resultsDiv.innerHTML = html + createSummary(allItems);
            }, 500);
        }

        // Auto-run on page load
        window.addEventListener('load', () => {
            setTimeout(runAllTests, 1000);
        });
    </script>
</body>
</html>
